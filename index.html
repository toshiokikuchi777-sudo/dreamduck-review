<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>DreamDuck — Sekiya Yurie Model | 3D 監修</title>
<meta name="description" content="DreamDuck 3D Design 監修サイト / Sekiya Yurie Model. 原案スケッチと3Dモデルを並べて確認できます。" />
<style>
  :root{
    --bg:        #ece9e3;
    --ink:       #1c1b19;
    --ink-soft:  #6b675f;
    --line:      #d9d4ca;
    --card:      #ffffff;
    --accent:    #f4b400;
    --accent-2:  #ffcf4d;
    --viewer-light: #f3f1ec;
    --viewer-dark:  #232323;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 12px 32px -12px rgba(0,0,0,.18);
    --radius: 18px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.6;
  }

  /* ---- 3D 描画用の全画面キャンバス（通常は静止画書き出しのみ＝非表示／拡大時のみ前面） ---- */
  #webgl{
    position:fixed; inset:0;
    width:100vw; height:100vh;
    z-index:-1;            /* 通常は背面（カードは静止スクショを表示） */
    pointer-events:none;
    display:block;
  }
  body.lb-open #webgl{ z-index:1960; }   /* ライトボックス時のみ最前面でステージ矩形に描画 */
  .site{ position:relative; }

  /* ---------- ヘッダー ---------- */
  header.hero{
    padding:54px 24px 30px;
    text-align:center;
    border-bottom:1px solid var(--line);
  }
  .hero .kicker{
    font-size:12px; letter-spacing:.42em; text-transform:uppercase;
    color:var(--ink-soft); margin:0 0 14px;
  }
  .hero h1{
    margin:0;
    font-size:clamp(34px, 7vw, 64px);
    font-weight:800; letter-spacing:-.02em; line-height:1.02;
  }
  .hero h1 .duck{ position:relative; }
  .hero h1 .duck::after{
    content:""; display:inline-block; width:.62em; height:.62em; margin-left:.14em;
    background:var(--accent); border-radius:50% 50% 50% 0; transform:rotate(45deg);
    vertical-align:.04em;
  }
  .hero .byline{
    margin:16px 0 0; font-size:clamp(15px,2.4vw,20px); font-weight:600; letter-spacing:.02em;
  }
  .hero .byline b{ background:linear-gradient(transparent 62%, var(--accent-2) 62%); padding:0 .12em; }
  .hero .sub{ margin:8px 0 0; color:var(--ink-soft); font-size:14px; letter-spacing:.06em; }

  /* ---------- 操作バー（固定） ---------- */
  .toolbar{
    position:sticky; top:0; z-index:30;
    background:rgba(236,233,227,.86);
    -webkit-backdrop-filter:saturate(160%) blur(12px);
    backdrop-filter:saturate(160%) blur(12px);
    border-bottom:1px solid var(--line);
    display:flex; flex-wrap:wrap; gap:14px 22px; justify-content:center; align-items:center;
    padding:12px 20px;
  }
  .ctl{ display:flex; align-items:center; gap:9px; }
  .ctl > .lbl{ font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-soft); }
  .seg{ display:inline-flex; background:#e3ded5; border:1px solid var(--line); border-radius:999px; padding:3px; }
  .seg button{
    appearance:none; border:0; background:transparent; cursor:pointer;
    font:inherit; font-size:13px; font-weight:600; color:var(--ink-soft);
    padding:6px 15px; border-radius:999px; line-height:1; transition:.18s;
    white-space:nowrap;
  }
  .seg button.on{ background:var(--ink); color:#fff; box-shadow:0 1px 4px rgba(0,0,0,.2); }
  .seg button:not(.on):hover{ color:var(--ink); }
  .switch{ display:inline-flex; align-items:center; gap:8px; cursor:pointer; user-select:none; font-size:13px; font-weight:600; color:var(--ink); }
  .switch input{ display:none; }
  .switch .track{ width:42px; height:24px; border-radius:999px; background:#cfc9bd; position:relative; transition:.2s; flex:none; }
  .switch .track::after{ content:""; position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.3); transition:.2s; }
  .switch input:checked + .track{ background:var(--accent); }
  .switch input:checked + .track::after{ transform:translateX(18px); }

  /* ---------- 一覧 ---------- */
  main{ max-width:1180px; margin:0 auto; padding:30px 20px 90px; }
  .grid{ display:flex; flex-direction:column; gap:26px; }

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); overflow:hidden;
  }
  .card__head{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:14px 20px; border-bottom:1px solid var(--line);
  }
  .card__dim{
    font-size:12px; color:var(--ink); background:#f1eee7; border:1px solid var(--line);
    border-radius:7px; padding:3px 9px; font-weight:600; white-space:nowrap; cursor:help;
    font-variant-numeric:tabular-nums;
  }
  .btn-cap{
    appearance:none; border:1px solid var(--ink); background:var(--ink); cursor:pointer;
    font:inherit; font-size:12px; font-weight:600; color:#fff;
    padding:6px 13px; border-radius:999px; transition:.16s; display:inline-flex; align-items:center; gap:6px;
  }
  .btn-cap:hover{ background:#000; }
  .btn-cap:disabled{ opacity:.55; cursor:default; }
  .card__no{
    font-weight:800; font-size:15px; letter-spacing:.04em;
    background:var(--ink); color:#fff; border-radius:8px; padding:4px 11px; line-height:1.2;
  }
  .card__no.secret{ background:var(--accent); color:var(--ink); }
  .card__file{ font-size:12px; color:var(--ink-soft); font-family:ui-monospace,Menlo,Consolas,monospace; }
  .card__head .spacer{ flex:1; }
  .btn-reset{
    appearance:none; border:1px solid var(--line); background:#fff; cursor:pointer;
    font:inherit; font-size:12px; font-weight:600; color:var(--ink-soft);
    padding:6px 12px; border-radius:999px; transition:.16s; display:inline-flex; align-items:center; gap:6px;
  }
  .btn-reset:hover{ color:var(--ink); border-color:#c4bdb0; }

  .card__body{ display:grid; grid-template-columns:1fr 1fr; gap:0; }
  @media (max-width:760px){ .card__body{ grid-template-columns:1fr; } }

  .panel{ position:relative; min-height:300px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .panel + .panel{ border-left:1px solid var(--line); }
  @media (max-width:760px){ .panel + .panel{ border-left:0; border-top:1px solid var(--line); } }
  .panel__tag{
    position:absolute; top:12px; left:12px; z-index:6;
    font-size:11px; font-weight:700; letter-spacing:.1em;
    background:rgba(255,255,255,.9); color:var(--ink); padding:4px 9px; border-radius:7px;
    border:1px solid var(--line); pointer-events:none;
  }
  .panel--model .panel__tag{ background:rgba(28,27,25,.78); color:#fff; border-color:transparent; }

  /* クリックで拡大できるパネル */
  .panel.zoomable{ cursor:zoom-in; }
  .panel.zoomable::after{
    content:"🔍 クリックで拡大"; position:absolute; right:10px; bottom:10px; z-index:6;
    font-size:11px; font-weight:600; color:var(--ink);
    background:rgba(255,255,255,.92); border:1px solid var(--line); border-radius:999px;
    padding:4px 11px; opacity:0; transform:translateY(4px); transition:.18s; pointer-events:none;
  }
  .panel.zoomable:hover::after{ opacity:1; transform:translateY(0); }
  .panel--model.is-dark.zoomable::after{ background:rgba(0,0,0,.5); color:#eee; border-color:rgba(255,255,255,.18); }

  /* 原案スケッチ */
  .panel--sketch{ background:#fbfaf7; }
  .panel--sketch img{ max-width:100%; max-height:300px; object-fit:contain; display:block; padding:16px; }
  .panel--sketch .no-sketch{ pointer-events:none; }

  /* 3Dモデル静止スクショ */
  .panel--model.is-light{ background:#f3f1ec; }
  .panel--model.is-dark{ background:#232323; }
  .panel--model .shot{ max-width:100%; max-height:300px; object-fit:contain; display:block; opacity:0; transition:opacity .35s; padding:6px; }
  .viewer__overlay{
    position:absolute; inset:0; z-index:7; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; color:var(--ink-soft);
    background:transparent; transition:opacity .4s; pointer-events:none;
  }
  .panel--model.is-dark .viewer__overlay{ color:#cfcfcf; }
  .viewer__overlay.hidden{ opacity:0; }
  .spinner{ width:34px; height:34px; border-radius:50%; border:3px solid rgba(128,128,128,.25); border-top-color:var(--accent); animation:spin 1s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .viewer__overlay .pct{ font-size:12px; font-weight:600; letter-spacing:.05em; }
  .viewer__overlay.err{ color:#c0392b; }

  /* ---------- ライトボックス（拡大表示） ---------- */
  .lb[hidden]{ display:none; }
  .lb{ position:fixed; inset:0; z-index:1850; display:flex; }
  .lb__backdrop{ position:absolute; inset:0; background:rgba(22,21,18,.80); -webkit-backdrop-filter:blur(5px); backdrop-filter:blur(5px); }
  .lb__panel{
    position:relative; z-index:1950; margin:auto; width:min(1120px,95vw); height:min(90vh,940px);
    background:var(--card); border-radius:18px; box-shadow:0 36px 90px -24px rgba(0,0,0,.65);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .lb__head{ display:flex; align-items:center; gap:12px; padding:11px 14px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .lb__title{ font-weight:800; font-size:15px; letter-spacing:.02em; }
  .lb__spacer{ flex:1; }
  .lb__ctls{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .lb__ctls[hidden]{ display:none; }
  .lb__close{ width:34px; height:34px; border-radius:50%; border:1px solid var(--line); background:#fff; cursor:pointer; font-size:14px; line-height:1; flex:none; }
  .lb__close:hover{ background:#f1eee7; }
  .lb__stage{ position:relative; flex:1; min-height:0; background:#f3f1ec; }
  body.lb-dark .lb__stage{ background:#232323; }
  .lb__viewer{ position:absolute; inset:0; touch-action:none; cursor:grab; }
  .lb__viewer[hidden]{ display:none; }
  .lb__viewer:active{ cursor:grabbing; }
  .lb__img{ position:absolute; inset:0; width:100%; height:100%; object-fit:contain; background:#fff; }
  .lb__img[hidden]{ display:none; }
  .lb__hint{ text-align:center; font-size:12px; color:var(--ink-soft); padding:8px; border-top:1px solid var(--line); }
  .lb__hint[hidden]{ display:none; }
  .lb__loading{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  .lb__loading[hidden]{ display:none; }
  .switch.sm .track{ width:38px; height:22px; }
  .switch.sm .track::after{ width:16px; height:16px; }
  .switch.sm input:checked + .track::after{ transform:translateX(16px); }

  /* ---------- カラーパレット ---------- */
  .palette{ padding:14px 20px 16px; border-top:1px solid var(--line); background:#fcfbf9; }
  .palette__head{ display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .palette__title{ font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-soft); font-weight:700; }
  .palette__note{ font-size:11px; color:var(--ink-soft); opacity:.85; }
  .palette__chips{ display:flex; flex-wrap:wrap; gap:9px; margin-top:11px; }
  .swatch{
    display:flex; align-items:center; gap:9px; background:#fff; border:1px solid var(--line);
    border-radius:10px; padding:5px 11px 5px 6px; cursor:pointer; font:inherit; transition:.14s;
  }
  .swatch:hover{ border-color:#c4bdb0; box-shadow:0 3px 10px -5px rgba(0,0,0,.28); }
  .swatch:active{ transform:translateY(1px); }
  .swatch__sw{ width:30px; height:30px; border-radius:7px; border:1px solid rgba(0,0,0,.12); flex:none; }
  .swatch__txt{ display:flex; flex-direction:column; line-height:1.28; text-align:left; }
  .swatch__txt b{ font-size:12px; font-family:ui-monospace,Menlo,Consolas,monospace; color:var(--ink); font-weight:700; letter-spacing:.01em; }
  .swatch__txt i{ font-size:11px; font-style:normal; color:var(--ink-soft); white-space:nowrap; }

  footer{ text-align:center; color:var(--ink-soft); font-size:12px; padding:30px 20px 50px; letter-spacing:.05em; }
  footer .brand{ font-weight:700; color:var(--ink); }

  .tb-hint{ font-size:12px; color:var(--ink-soft); letter-spacing:.02em; }
  @media (max-width:680px){ .tb-hint{ display:none; } }
  .btn-reload{
    appearance:none; border:1px solid var(--line); background:#fff; cursor:pointer;
    font:inherit; font-size:13px; font-weight:600; color:var(--ink);
    padding:7px 14px; border-radius:999px; transition:.16s;
  }
  .btn-reload:hover{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(244,180,0,.18); }

  .panel--sketch .no-sketch{
    color:var(--ink-soft); text-align:center; font-size:14px; line-height:1.8; padding:24px;
  }
  .panel--sketch .no-sketch span{ font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px; opacity:.7; }

  .empty{
    max-width:560px; margin:60px auto; padding:26px 28px; text-align:center; line-height:1.9;
    background:#fff; border:1px solid var(--line); border-radius:14px; color:var(--ink-soft); box-shadow:var(--shadow);
  }

  .nojs{ max-width:680px; margin:40px auto; padding:18px 22px; background:#fff3cd; border:1px solid #ffe08a; border-radius:12px; color:#665100; }

  /* ---------- パスワードロック ---------- */
  .lock{
    position:fixed; inset:0; z-index:1000;
    display:flex; align-items:center; justify-content:center; padding:24px;
    background:
      radial-gradient(1100px 560px at 50% -12%, #fff4cf 0%, rgba(255,244,207,0) 62%),
      var(--bg);
    transition:opacity .35s ease;
  }
  .lock.hidden{ opacity:0; pointer-events:none; }
  .lock__card{
    width:min(380px, 92vw); background:var(--card); border:1px solid var(--line);
    border-radius:20px; box-shadow:var(--shadow); padding:34px 30px 30px; text-align:center;
  }
  .lock__card.shake{ animation:shake .4s; }
  @keyframes shake{ 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }
  .lock__brand{ font-size:30px; font-weight:800; letter-spacing:-.02em; }
  .lock__dot{ display:inline-block; width:.5em; height:.5em; margin-left:.16em; background:var(--accent); border-radius:50% 50% 50% 0; transform:rotate(45deg); }
  .lock__sub{ margin:6px 0 0; font-size:13px; font-weight:600; color:var(--ink-soft); letter-spacing:.05em; }
  .lock__msg{ margin:22px 0 14px; font-size:13px; color:var(--ink-soft); }
  .lock__form{ display:flex; gap:8px; }
  .lock__form input{
    flex:1; min-width:0; font:inherit; font-size:15px; padding:11px 14px;
    border:1px solid var(--line); border-radius:11px; background:#fbfaf7; color:var(--ink); outline:none;
  }
  .lock__form input:focus{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(244,180,0,.2); }
  .lock__form button{
    font:inherit; font-weight:700; font-size:14px; padding:0 18px; border:0; border-radius:11px;
    background:var(--ink); color:#fff; cursor:pointer; transition:.15s; white-space:nowrap;
  }
  .lock__form button:hover{ background:#000; }
  .lock__err{ margin:14px 0 0; font-size:13px; color:#c0392b; font-weight:600; }
</style>
</head>

{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

/* ====== モデル自動検出設定 ======
   models/NN.glb と sketches/NN.png を起動時に走査して自動で並べる。
   ファイルを差し替え・追加 → 再読み込みするだけで反映される。 */
const MAX_PROBE = 40;   // 01〜40 まで存在確認（歯抜けOK）

async function headInfo(url){
  try{
    const r = await fetch(url, { method:'HEAD', cache:'no-store' });
    if(!r.ok) return null;
    // 更新印（中身が変わると変化）。URLに付けてキャッシュ更新検知に使う。
    const tag = r.headers.get('etag') || r.headers.get('last-modified') || '';
    return { ver: tag.replace(/[^a-zA-Z0-9]/g, '').slice(-16) };
  }catch(e){ return null; }
}

async function discoverModels(){
  const tasks = [];
  for(let i=1; i<=MAX_PROBE; i++){
    const id = String(i).padStart(2, '0');
    tasks.push((async ()=>{
      const glb = await headInfo(`models/${id}.glb`);
      if(!glb) return null;
      const png = await headInfo(`sketches/${id}.png`);
      return { id, label:id, glbVer:glb.ver, pngVer:png?png.ver:null };
    })());
  }
  tasks.push((async ()=>{
    const glb = await headInfo('models/secret.glb');
    if(!glb) return null;
    const png = await headInfo('sketches/secret.png');
    return { id:'secret', label:'SECRET', secret:true, glbVer:glb.ver, pngVer:png?png.ver:null };
  })());
  const res = await Promise.all(tasks);
  return res.filter(Boolean);   // 01..40（昇順）→ secret の順を維持
}

const BG = { light: new THREE.Color(0xf3f1ec), dark: new THREE.Color(0x232323) };
let state = { mode:'persp', bg:'light', rotate:false };

const canvas = document.getElementById('webgl');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true, preserveDrawingBuffer:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.70;
renderer.autoClear = false;
renderer.shadowMap.enabled = false;

const pmrem = new THREE.PMREMGenerator(renderer);
const envMap = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const draco = new DRACOLoader();
draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

const DEG = Math.PI / 180;

/* ====== ビューア（DOM非依存・拡大時のみコントロール生成） ====== */
class Viewer{
  constructor(model){
    this.id = model.id;
    this.glbVer = model.glbVer || '';
    this.loaded = false; this.loading = false; this.failed = false;
    this.dimEl = null; this.dims = null;
    this.shotPanel = null; this.shotImg = null; this.overlayEl = null; this.pctEl = null;
    this.controls = null; this.lbEl = null;
    this.fov = 38;
    this.mode = 'persp';
    this.orthoHalfH = 1;
    this.target = new THREE.Vector3();

    this.scene = new THREE.Scene();
    this.scene.environment = envMap;

    // フロア光：陰側を強めに持ち上げる（影をやわらかく）
    const ambient = new THREE.AmbientLight(0xffffff, 0.58);
    this.scene.add(ambient);
    const hemi = new THREE.HemisphereLight(0xffffff, 0xc2b8a3, 0.45);
    this.scene.add(hemi);
    // キー（弱め）＋フィル（反対側補光）
    const key = new THREE.DirectionalLight(0xffffff, 0.62);
    key.position.set(3, 5, 4);
    this.scene.add(key);
    const fill = new THREE.DirectionalLight(0xffffff, 0.50);
    fill.position.set(-4, 1, -3);
    this.scene.add(fill);
    // リムライト：背後上から輪郭に反射ハイライト
    const rim = new THREE.DirectionalLight(0xffffff, 1.05);
    rim.position.set(-3, 4, -6);
    this.scene.add(rim);
    // トップライト：天面の照り（反射光）
    const top = new THREE.DirectionalLight(0xffffff, 0.42);
    top.position.set(0.5, 6, 0.5);
    this.scene.add(top);

    this.persp = new THREE.PerspectiveCamera(this.fov, 1, 0.01, 2000);
    this.ortho = new THREE.OrthographicCamera(-1, 1, 1, -1, -2000, 2000);
    this.camera = this.persp;
    this.home = { pos:new THREE.Vector3(2,1.2,3), target:new THREE.Vector3() };
  }

  makeControls(el){
    const c = new OrbitControls(this.camera, el);
    c.enableDamping = true;
    c.dampingFactor = 0.08;
    c.enablePan = false;
    c.minDistance = 0.001;
    c.maxDistance = 5000;
    c.autoRotateSpeed = 1.6;
    c.autoRotate = state.rotate;
    c.target.copy(this.target);
    c.update();
    return c;
  }

  load(){
    if(this.loaded || this.loading || this.failed) return;
    this.loading = true;
    if(this.overlayEl) this.overlayEl.classList.remove('hidden','err');
    const url = `models/${this.id}.glb` + (this.glbVer ? `?v=${this.glbVer}` : '');
    loader.load(
      url,
      (gltf)=>{
        const obj = gltf.scene;
        const box = new THREE.Box3().setFromObject(obj);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        obj.position.sub(center);              // 原点中心へ
        this.scene.add(obj);

        const radius = Math.max(size.length() / 2, 0.001);
        this.frameObject(radius);

        this.dims = { x:size.x, y:size.y, z:size.z };
        if(this.dimEl){
          this.dimEl.textContent = `W ${size.x.toFixed(1)} × H ${size.y.toFixed(1)} × D ${size.z.toFixed(1)} mm`;
        }

        this.loaded = true; this.loading = false;
        renderStill(this);
        if(this.overlayEl){
          this.overlayEl.classList.add('hidden');
          setTimeout(()=>{ if(this.overlayEl) this.overlayEl.style.display='none'; }, 420);
        }
        // 読み込み中に拡大を開いていたら、完了後にインタラクティブ起動
        if(active === this && lbOpen){ lbLoading.hidden = true; this.activate(lbViewer); }
      },
      (xhr)=>{
        if(this.pctEl){
          this.pctEl.textContent = xhr.total ? Math.round(xhr.loaded/xhr.total*100) + '%'
                                             : Math.round(xhr.loaded/1048576) + ' MB';
        }
      },
      (err)=>{
        console.error('GLB load error', this.id, err);
        this.loading = false; this.failed = true;
        if(this.overlayEl){
          this.overlayEl.classList.add('err');
          this.overlayEl.innerHTML = '<div class="pct">読み込みに失敗しました<br>models/'+this.id+'.glb</div>';
        }
      }
    );
  }

  frameObject(radius){
    this.radius = radius;
    const dist = (radius / Math.sin((this.fov*DEG)/2)) * 1.12;
    const dir = new THREE.Vector3(0.55, 0.32, 1).normalize();
    const target = new THREE.Vector3(0,0,0);
    const pos = dir.multiplyScalar(dist);

    this.persp.near = dist/200; this.persp.far = dist*200;
    this.persp.position.copy(pos);
    this.persp.lookAt(target);

    this.ortho.position.copy(pos);
    this.ortho.lookAt(target);
    this.orthoHalfH = dist * Math.tan((this.fov*DEG)/2);

    this.home = { pos:pos.clone(), target:target.clone(), orthoHalfH:this.orthoHalfH };
    this.target.copy(target);
    this.camera = this.persp; this.mode = 'persp';
  }

  applyMode(mode, force){
    if(!force && mode === this.mode) return;
    const from = this.camera;
    const target = this.target;
    const dir = new THREE.Vector3().subVectors(from.position, target);
    const dist = dir.length() || 1;
    dir.normalize();

    if(mode === 'ortho'){
      this.orthoHalfH = dist * Math.tan((this.fov*DEG)/2);
      this.ortho.position.copy(from.position);
      this.ortho.up.copy(from.up);
      this.ortho.zoom = 1;
      this.camera = this.ortho;
    } else {
      const effHalfH = this.orthoHalfH / (this.ortho.zoom || 1);
      const d2 = effHalfH / Math.tan((this.fov*DEG)/2);
      this.persp.position.copy(target).add(dir.multiplyScalar(d2));
      this.persp.up.copy(from.up);
      this.camera = this.persp;
    }
    this.camera.lookAt(target);
    if(this.controls && this.lbEl){
      this.controls.dispose();
      this.controls = this.makeControls(this.lbEl);
    }
    this.mode = mode;
  }

  activate(el){
    this.lbEl = el;
    if(this.controls){ this.controls.dispose(); this.controls = null; }
    this.applyMode(state.mode, true);
    this.controls = this.makeControls(el);
  }
  deactivate(){
    if(this.controls){ this.controls.dispose(); this.controls = null; }
    this.lbEl = null;
  }

  reset(){
    if(!this.home) return;
    this.persp.position.copy(this.home.pos);
    this.ortho.position.copy(this.home.pos);
    this.orthoHalfH = this.home.orthoHalfH || this.orthoHalfH;
    this.ortho.zoom = 1;
    this.target.copy(this.home.target);
    this.camera.lookAt(this.home.target);
    if(this.controls){ this.controls.target.copy(this.home.target); this.controls.update(); }
  }

  setAutoRotate(v){ if(this.controls) this.controls.autoRotate = v; }
}

/* ====== 3D 静止スクショ生成（カードのサムネ用） ====== */
function renderStill(v){
  if(!v.loaded || !v.shotImg) return;
  const SIZE = 720;
  const prev = new THREE.Vector2(); renderer.getSize(prev);
  const prevPR = renderer.getPixelRatio();
  renderer.setScissorTest(false);
  renderer.setPixelRatio(1);
  renderer.setSize(SIZE, SIZE, false);
  const cam = new THREE.PerspectiveCamera(v.fov, 1, 0.01, v.radius*400);
  cam.position.copy(v.home.pos); cam.up.set(0,1,0); cam.lookAt(v.home.target);
  cam.updateProjectionMatrix();
  renderer.setViewport(0,0,SIZE,SIZE);
  renderer.setClearColor(BG[state.bg], 1);
  renderer.clear();
  renderer.render(v.scene, cam);
  v.shotImg.src = renderer.domElement.toDataURL('image/png');
  v.shotImg.style.opacity = '1';
  renderer.setPixelRatio(prevPR);
  renderer.setSize(prev.x, prev.y, false);
}
function rerenderStills(){ viewers.forEach(v => { if(v.loaded) renderStill(v); }); }
function clearGL(){ renderer.setScissorTest(false); renderer.setClearColor(0x000000, 0); renderer.clear(); }

/* ====== カード生成 ====== */
const grid = document.getElementById('grid');
const viewers = [];

function buildCard(m){
  const card = document.createElement('section');
  card.className = 'card';
  const sketchSrc = `sketches/${m.id}.png` + (m.pngVer ? `?v=${m.pngVer}` : '');
  const sketchInner = m.pngVer
    ? `<img class="sketch-img" loading="lazy" src="${sketchSrc}" alt="${m.label} sketch" />`
    : `<div class="no-sketch">原案スケッチなし<br><span>sketches/${m.id}.png</span></div>`;
  card.innerHTML = `
    <div class="card__head">
      <span class="card__no ${m.secret?'secret':''}">${m.label}</span>
      <span class="card__file">models/${m.id}.glb${m.pngVer?` · sketches/${m.id}.png`:''}</span>
      <span class="card__dim" title="GLBの書き出し寸法（mm想定）。W=幅 / H=高さ / D=奥行">寸法測定中…</span>
    </div>
    <div class="card__body">
      <div class="panel panel--model is-${state.bg} zoomable">
        <span class="panel__tag">3Dモデル / Model</span>
        <img class="shot" alt="${m.label} 3D" />
        <div class="viewer__overlay"><div class="spinner"></div><div class="pct">準備中…</div></div>
      </div>
      <div class="panel panel--sketch zoomable">
        <span class="panel__tag">原案スケッチ / Sketch</span>
        ${sketchInner}
      </div>
    </div>
    <div class="palette" data-id="${m.id}"></div>`;
  grid.appendChild(card);
  renderPalette(card, m.id);

  const v = new Viewer(m);
  v.dimEl    = card.querySelector('.card__dim');
  v.shotPanel = card.querySelector('.panel--model');
  v.shotImg   = card.querySelector('.shot');
  v.overlayEl = card.querySelector('.viewer__overlay');
  v.pctEl     = card.querySelector('.pct');
  viewers.push(v);

  v.shotPanel.addEventListener('click', ()=> openLightbox3D(v));
  const skImg = card.querySelector('.sketch-img');
  if(skImg){
    card.querySelector('.panel--sketch').addEventListener('click',
      ()=> openLightboxImg(skImg.currentSrc || skImg.src, `${m.label} ・ 原案スケッチ`));
  }
}

/* ====== カラーパレット（指定HEX ＋ 近似PMS） ====== */
function renderPalette(card, mid){
  const host = card.querySelector('.palette');
  const data = (typeof PALETTES !== 'undefined' && PALETTES[mid]) || [];
  if(!host) return;
  if(!data.length){ host.style.display='none'; return; }
  host.innerHTML =
    `<div class="palette__head"><span class="palette__title">カラー指定</span>`
    + `<span class="palette__note">HEX＝抽出値 ／ PANTONE＝近似Coated（参考）</span></div>`
    + `<div class="palette__chips">`
    + data.map(c => `
        <button class="swatch" type="button" data-hex="${c.h}"
                title="指定 ${c.h}　→　${c.p}（PMS近似色 ${c.ph} / ΔE ${c.de}）　クリックでHEXコピー">
          <span class="swatch__sw" style="background:${c.h}"></span>
          <span class="swatch__txt"><b>${c.h}</b><i>${c.p}</i></span>
        </button>`).join('')
    + `</div>`;
  host.querySelectorAll('.swatch').forEach(b => {
    b.addEventListener('click', ()=>{
      const hex = b.dataset.hex;
      try{ navigator.clipboard && navigator.clipboard.writeText(hex); }catch(_){}
      const bb = b.querySelector('b'); const prev = bb.textContent;
      bb.textContent = 'コピー！';
      setTimeout(()=>{ bb.textContent = prev; }, 850);
    });
  });
}

/* ====== 各アングル一括撮影 → コンタクトシートPNG ====== */
const CAPTURE_ANGLES = [
  { name:'正面 Front',        az:0,              ortho:true },
  { name:'右 Right',          az:Math.PI/2,      ortho:true },
  { name:'背面 Back',         az:Math.PI,        ortho:true },
  { name:'左 Left',           az:-Math.PI/2,     ortho:true },
  { name:'俯瞰 3/4',          az:Math.PI/5,    pol:Math.PI/3.1, ortho:false },
  { name:'斜め後ろ俯瞰 Rear', az:Math.PI*0.78, pol:Math.PI/3.4, ortho:false },
];

async function captureAngles(v, btn){
  if(!v.loaded){
    if(btn){ const t=btn.textContent; btn.textContent='読み込み待ち…'; setTimeout(()=>btn.textContent=t,1300); }
    v.load();
    return;
  }
  if(btn){ btn.disabled=true; btn._t=btn.textContent; btn.textContent='撮影中…'; }
  try{
    const SIZE = 1000;
    const prev = new THREE.Vector2(); renderer.getSize(prev);
    const prevPR = renderer.getPixelRatio();
    renderer.setScissorTest(false);
    renderer.setPixelRatio(1);
    renderer.setSize(SIZE, SIZE, false);

    const shots = [];
    for(const a of CAPTURE_ANGLES){
      const pol = (a.pol != null) ? a.pol : Math.PI/2;
      const dir = new THREE.Vector3().setFromSphericalCoords(1, pol, a.az);
      let cam;
      if(a.ortho){
        const h = v.radius * 1.06;
        cam = new THREE.OrthographicCamera(-h, h, h, -h, -v.radius*40, v.radius*40);
        cam.position.copy(dir.clone().multiplyScalar(v.radius * 6));
      } else {
        cam = new THREE.PerspectiveCamera(v.fov, 1, 0.01, v.radius*400);
        const dist = (v.radius / Math.sin((v.fov*Math.PI/180)/2)) * 1.12;
        cam.position.copy(dir.clone().multiplyScalar(dist));
      }
      cam.up.set(0,1,0);
      cam.lookAt(0,0,0);
      cam.updateProjectionMatrix();
      renderer.setViewport(0,0,SIZE,SIZE);
      renderer.setClearColor(BG[state.bg], 1);
      renderer.clear();
      renderer.render(v.scene, cam);
      shots.push({ name:a.name, url: renderer.domElement.toDataURL('image/png') });
    }

    renderer.setPixelRatio(prevPR);
    renderer.setSize(prev.x, prev.y, false);
    renderer.setScissorTest(true);

    await composeAndDownload(v, shots);
  } catch(e){
    console.error('capture error', e);
    alert('撮影に失敗しました: ' + e.message);
  } finally {
    if(btn){ btn.disabled=false; btn.textContent = btn._t || '📷 各アングル撮影'; }
  }
}

function loadImg(url){ return new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=url; }); }

async function composeAndDownload(v, shots){
  const imgs = await Promise.all(shots.map(s => loadImg(s.url)));
  const tile=560, pad=22, cols=3, labelH=36, headH=104;
  const rows=Math.ceil(shots.length/cols);
  const W = cols*tile + (cols+1)*pad;
  const H = headH + rows*(tile+labelH+pad) + pad;
  const c = document.createElement('canvas'); c.width=W; c.height=H;
  const ctx = c.getContext('2d');
  const dark = state.bg==='dark';

  ctx.fillStyle = dark ? '#1b1b1b' : '#ffffff';
  ctx.fillRect(0,0,W,H);
  ctx.textBaseline='top';
  ctx.fillStyle = dark ? '#ffffff' : '#1c1b19';
  ctx.font = '700 34px "Helvetica Neue", Arial, sans-serif';
  ctx.fillText(`DreamDuck  ${String(v.id).toUpperCase()}`, pad, 26);
  ctx.font = '500 19px "Helvetica Neue", Arial, sans-serif';
  ctx.fillStyle = dark ? '#bcbcbc' : '#8a857c';
  const d = v.dims;
  const dt = d ? `W ${d.x.toFixed(1)} × H ${d.y.toFixed(1)} × D ${d.z.toFixed(1)} mm` : '';
  ctx.fillText(`Sekiya Yurie Model     ·     ${dt}`, pad, 66);

  for(let i=0;i<imgs.length;i++){
    const r = Math.floor(i/cols), col = i%cols;
    const x = pad + col*(tile+pad);
    const y = headH + pad + r*(tile+labelH+pad);
    ctx.fillStyle = dark ? '#252525' : '#f3f1ec';
    ctx.fillRect(x, y, tile, tile);
    ctx.drawImage(imgs[i], x, y, tile, tile);
    ctx.strokeStyle = dark ? '#3a3a3a' : '#e2ddd2'; ctx.lineWidth=1;
    ctx.strokeRect(x+0.5, y+0.5, tile-1, tile-1);
    ctx.fillStyle = dark ? '#dddddd' : '#555555';
    ctx.font = '600 18px "Helvetica Neue", Arial, sans-serif';
    ctx.textAlign='center';
    ctx.fillText(shots[i].name, x + tile/2, y + tile + 9);
    ctx.textAlign='left';
  }
  downloadCanvas(c, `DreamDuck_${v.id}_angles.png`);
}

function downloadCanvas(canvas, filename){
  canvas.toBlob((blob)=>{
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=> URL.revokeObjectURL(url), 2000);
  }, 'image/png');
}

/* ====== 遅延ロード（描画ループ内の可視判定で発火） ====== */
const PRELOAD_MARGIN = 320;   // 画面手前この距離に入ったら読み込み開始

/* ====== 操作バー ====== */
function setSeg(id, btn){
  const seg = document.getElementById(id); if(!seg || !btn) return;
  seg.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
  btn.classList.add('on');
}
document.getElementById('seg-bg').addEventListener('click', (e)=>{
  const b = e.target.closest('button'); if(!b) return;
  setSeg('seg-bg', b);
  state.bg = b.dataset.bg;
  document.body.classList.toggle('lb-dark', state.bg==='dark');
  document.querySelectorAll('.panel--model').forEach(p=>{
    p.classList.toggle('is-dark', state.bg==='dark');
    p.classList.toggle('is-light', state.bg==='light');
  });
  rerenderStills();   // サムネのスクショを新しい背景で再生成
});
document.getElementById('btn-reload').addEventListener('click', ()=>{
  location.href = location.pathname + '?r=' + (window.performance ? Math.floor(performance.now()) : 1);
});

/* ====== ライトボックス（クリックで拡大） ====== */
let active = null, lbOpen = false;
const lb        = document.getElementById('lightbox');
const lbStage   = document.getElementById('lbStage');
const lbViewer  = document.getElementById('lbViewer');
const lbImg     = document.getElementById('lbImg');
const lbCtls    = document.getElementById('lbCtls');
const lbHint    = document.getElementById('lbHint');
const lbTitle   = document.getElementById('lbTitle');
const lbLoading = document.getElementById('lbLoading');

function openLightbox3D(v){
  active = v; lbOpen = true;
  lbImg.hidden = true; lbViewer.hidden = false; lbCtls.hidden = false; lbHint.hidden = false;
  lbTitle.textContent = `${String(v.id).toUpperCase()} ・ 3Dモデル`;
  setSeg('lb-proj', [...document.querySelectorAll('#lb-proj button')].find(b=>b.dataset.mode===state.mode));
  document.getElementById('lb-rotate').checked = state.rotate;
  clearGL();
  lb.hidden = false; document.body.classList.add('lb-open');
  if(v.loaded){ lbLoading.hidden = true; v.activate(lbViewer); }
  else { lbLoading.hidden = false; v.load(); }
  startRenderLoop();
}
function openLightboxImg(src, title){
  active = null; lbOpen = true;
  lbViewer.hidden = true; lbImg.hidden = false; lbCtls.hidden = true; lbHint.hidden = true; lbLoading.hidden = true;
  lbImg.src = src; lbTitle.textContent = title;
  clearGL();   // 直前の3Dフレームがキャンバスに残って上に出るのを防ぐ
  lb.hidden = false; document.body.classList.add('lb-open');
}
function closeLightbox(){
  lbOpen = false; lb.hidden = true; document.body.classList.remove('lb-open');
  if(active){ active.deactivate(); active = null; }
  lbImg.removeAttribute('src');
}
document.getElementById('lbClose').addEventListener('click', closeLightbox);
lb.querySelector('.lb__backdrop').addEventListener('click', closeLightbox);
window.addEventListener('keydown', (e)=>{ if(e.key==='Escape' && lbOpen) closeLightbox(); });
document.getElementById('lb-proj').addEventListener('click', (e)=>{
  const b = e.target.closest('button'); if(!b || !active) return;
  setSeg('lb-proj', b); state.mode = b.dataset.mode; active.applyMode(state.mode);
});
document.getElementById('lb-rotate').addEventListener('change', (e)=>{
  state.rotate = e.target.checked; if(active) active.setAutoRotate(state.rotate);
});
document.getElementById('lbCap').addEventListener('click', ()=>{
  if(active) captureAngles(active, document.getElementById('lbCap'));
});
document.getElementById('lbReset').addEventListener('click', ()=>{ if(active) active.reset(); });

/* ====== サイズ・遅延ロード（通常時はrAFを回さない） ====== */
function viewportSize(){
  const w = window.innerWidth || document.documentElement.clientWidth || 0;
  const h = window.innerHeight || document.documentElement.clientHeight || 0;
  return { w, h };
}
function resizeCanvas(){
  const { w, h } = viewportSize();
  const pr = renderer.getPixelRatio();
  if(canvas.width !== Math.floor(w*pr) || canvas.height !== Math.floor(h*pr)){
    renderer.setSize(w, h, false);
  }
}
function checkLazy(){
  const { w:vw, h:vh } = viewportSize();
  for(const v of viewers){
    if(v.loaded || v.loading || v.failed) continue;
    const el = v.shotPanel; if(!el) continue;
    const r = el.getBoundingClientRect();
    if(r.bottom > -PRELOAD_MARGIN && r.top < vh + PRELOAD_MARGIN && r.right > 0 && r.left < vw) v.load();
  }
}
let lazyScheduled = false;
function scheduleLazy(){
  if(lazyScheduled) return; lazyScheduled = true;
  requestAnimationFrame(()=>{ lazyScheduled = false; checkLazy(); });
}
window.addEventListener('scroll', scheduleLazy, { passive:true });
window.addEventListener('resize', ()=>{ resizeCanvas(); scheduleLazy(); });

/* ====== 拡大中だけ回す描画ループ ====== */
let rafId = null;
function startRenderLoop(){ if(rafId == null) renderLoop(); }
function renderLoop(){
  if(!lbOpen || !active){ rafId = null; return; }
  rafId = requestAnimationFrame(renderLoop);
  resizeCanvas();
  if(!active.loaded) return;

  const { h:vh } = viewportSize();
  renderer.setScissorTest(false);
  renderer.setClearColor(0x000000, 0);
  renderer.clear();

  const r = lbStage.getBoundingClientRect();
  if(r.width > 2 && r.height > 2){
    const aspect = r.width / r.height;
    if(active.camera.isPerspectiveCamera){
      active.camera.aspect = aspect;
      active.camera.updateProjectionMatrix();
    } else {
      active.camera.top = active.orthoHalfH;
      active.camera.bottom = -active.orthoHalfH;
      active.camera.left = -active.orthoHalfH * aspect;
      active.camera.right = active.orthoHalfH * aspect;
      active.camera.updateProjectionMatrix();
    }
    if(active.controls) active.controls.update();
    renderer.setViewport(r.left, vh - r.bottom, r.width, r.height);
    renderer.setScissor(r.left, vh - r.bottom, r.width, r.height);
    renderer.setScissorTest(true);
    renderer.setClearColor(BG[state.bg], 1);
    renderer.clear();
    renderer.render(active.scene, active.camera);
  }
}
/* ====== 起動：自動検出 → カード生成 → 描画開始 ====== */
let appStarted = false;
async function startApp(){
  if(appStarted) return;
  appStarted = true;
  let models = [];
  try{ models = await discoverModels(); }catch(e){ console.error(e); }
  if(!models.length){
    grid.innerHTML = '<div class="empty">モデルが見つかりませんでした。<br>'
      + '簡易サーバー経由で開いているか（README参照）、<br>models/ に GLB があるかご確認ください。</div>';
  } else {
    for(const m of models) buildCard(m);
    const count = document.getElementById('count');
    if(count) count.textContent = models.length + ' 点';
  }
  resizeCanvas();
  checkLazy();
  setTimeout(checkLazy, 300);
  setTimeout(checkLazy, 1200);
}

/* ====== 閲覧パスワード（簡易ゲート / 平文は埋め込まずSHA-256で照合） ====== */
const PW_HASH = '40aec3314f9f8026c87121aff2a383fff61542f92e4e1fa71b46621045a09652';
const AUTH_KEY = 'dd_review_auth';

async function sha256hex(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}

const lockEl = document.getElementById('lock');
function unlock(){
  lockEl.classList.add('hidden');
  setTimeout(()=>{ lockEl.style.display = 'none'; }, 360);
  startApp();
}

if(sessionStorage.getItem(AUTH_KEY) === '1'){
  unlock();
} else {
  const form  = document.getElementById('lock__form');
  const input = document.getElementById('lock__input');
  const errEl = document.getElementById('lock__err');
  const card  = lockEl.querySelector('.lock__card');
  setTimeout(()=> input.focus(), 50);
  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    let ok = false;
    try{ ok = (await sha256hex(input.value)) === PW_HASH; }catch(_){ ok = false; }
    if(ok){
      sessionStorage.setItem(AUTH_KEY, '1');
      unlock();
    } else {
      errEl.hidden = false;
      input.value = ''; input.focus();
      card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
    }
  });
}
